<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compteur d'Heures</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.8em;
            color: #fff;
        }

        .clock {
            text-align: center;
            font-size: 1.2em;
            color: #aaa;
            margin-bottom: 25px;
        }

        .status-bar {
            background: #16213e;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.95em;
            color: #8ecae6;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 16px;
            font-size: 1.3em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-day-start {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: #fff;
            box-shadow: 0 6px 20px rgba(0, 184, 148, 0.4);
        }

        .btn-day-end {
            background: linear-gradient(135deg, #e17055, #d63031);
            color: #fff;
            box-shadow: 0 6px 20px rgba(214, 48, 49, 0.4);
        }

        .btn-intervention-start {
            background: linear-gradient(135deg, #0984e3, #6c5ce7);
            color: #fff;
            box-shadow: 0 6px 20px rgba(9, 132, 227, 0.3);
        }

        .btn-intervention-end {
            background: linear-gradient(135deg, #fdcb6e, #e17055);
            color: #fff;
            box-shadow: 0 6px 20px rgba(253, 203, 110, 0.3);
        }

        .btn-pause-start {
            background: linear-gradient(135deg, #636e72, #2d3436);
            color: #fff;
            box-shadow: 0 6px 20px rgba(99, 110, 114, 0.3);
        }

        .btn-pause-end {
            background: linear-gradient(135deg, #fdcb6e, #f39c12);
            color: #fff;
            box-shadow: 0 6px 20px rgba(243, 156, 18, 0.3);
        }

        .btn:disabled {
            background: #2d3436;
            color: #636e72;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .intervention-input {
            margin-bottom: 15px;
            display: none;
        }

        .intervention-input label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 0.9em;
        }

        .intervention-input select,
        .intervention-input input {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 2px solid #2d3436;
            background: #16213e;
            color: #fff;
            font-size: 1em;
            margin-bottom: 8px;
        }

        .intervention-input select:focus,
        .intervention-input input:focus {
            outline: none;
            border-color: #0984e3;
        }

        .section {
            background: #16213e;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .section h3 {
            margin-bottom: 15px;
            color: #dfe6e9;
            font-size: 1em;
            text-align: center;
        }

        .timer {
            text-align: center;
            font-size: 1.5em;
            font-weight: bold;
            color: #74b9ff;
            margin: 10px 0;
            font-family: 'Courier New', monospace;
        }

        /* Log / Résumé */
        .log-section {
            display: none;
            background: #0f3460;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
        }

        .log-section h2 {
            text-align: center;
            margin-bottom: 15px;
            color: #fff;
        }

        .log-entry {
            background: #16213e;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            font-size: 0.9em;
            border-left: 4px solid #0984e3;
        }

        .log-entry.pause {
            border-left-color: #636e72;
        }

        .log-summary {
            background: #1a1a2e;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            text-align: center;
        }

        .log-summary .total {
            font-size: 1.5em;
            font-weight: bold;
            color: #00b894;
        }

        .btn-email {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: #fff;
            box-shadow: 0 6px 20px rgba(0, 184, 148, 0.3);
            margin-top: 15px;
            font-size: 1.1em;
            padding: 16px;
        }

        .btn-reset {
            background: linear-gradient(135deg, #636e72, #2d3436);
            color: #fff;
            margin-top: 10px;
            font-size: 0.9em;
            padding: 14px;
        }

        .running-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #00b894;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
            margin-right: 8px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⏱️ Mes Heures</h1>
        <div class="clock" id="clock"></div>

        <div class="status-bar" id="statusBar">
            Prêt à commencer la journée
        </div>

        <!-- Bouton Journée -->
        <button class="btn btn-day-start" id="btnDay" onclick="toggleDay()">
            ☀️ Début de Journée
        </button>

        <!-- Section Intervention -->
        <div class="section hidden" id="interventionSection">
            <h3>🔧 Intervention / Chantier</h3>
            <div class="intervention-input" id="interventionInput">
                <label>Chantier :</label>
                <select id="chantierSelect" onchange="onChantierSelect()">
                    <option value="">-- Choisir un chantier existant --</option>
                </select>
                <input type="text" id="chantierText" placeholder="Ou saisir un nouveau chantier..." />
            </div>
            <button class="btn btn-intervention-start" id="btnIntervention" onclick="toggleIntervention()">
                ▶️ Début Intervention
            </button>
            <div class="timer hidden" id="interventionTimer">00:00:00</div>
        </div>

        <!-- Section Pause -->
        <div class="section hidden" id="pauseSection">
            <h3>☕ Pause</h3>
            <button class="btn btn-pause-start" id="btnPause" onclick="togglePause()">
                ⏸️ Début Pause
            </button>
            <div class="timer hidden" id="pauseTimer">00:00:00</div>
        </div>

        <!-- Log de fin de journée -->
        <div class="log-section" id="logSection">
            <h2>📋 Résumé de la Journée</h2>
            <div id="logEntries"></div>
            <div class="log-summary">
                <div>Temps total travaillé</div>
                <div class="total" id="totalWorked">--:--</div>
                <div style="margin-top:8px; color:#aaa; font-size:0.85em;">
                    <span id="totalPauseDisplay"></span>
                </div>
            </div>
            <button class="btn btn-email" onclick="sendByEmail()">
                📧 Envoyer par Email
            </button>
            <button class="btn btn-reset" onclick="resetAll()">
                🔄 Nouvelle Journée
            </button>
        </div>
    </div>

    <script>
        // State
        let state = {
            dayStarted: false,
            dayStart: null,
            dayEnd: null,
            interventionRunning: false,
            interventionStart: null,
            pauseRunning: false,
            pauseStart: null,
            interventions: [], // {chantier, start, end, duration}
            pauses: [],       // {start, end, duration}
            chantiers: JSON.parse(localStorage.getItem('chantiers') || '[]')
        };

        let interventionInterval = null;
        let pauseInterval = null;

        // Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('fr-CH');
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Load saved chantiers
        function loadChantiers() {
            const select = document.getElementById('chantierSelect');
            select.innerHTML = '<option value="">-- Choisir un chantier existant --</option>';
            state.chantiers.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                opt.textContent = c;
                select.appendChild(opt);
            });
        }
        loadChantiers();

        function onChantierSelect() {
            const val = document.getElementById('chantierSelect').value;
            if (val) {
                document.getElementById('chantierText').value = val;
            }
        }

        function saveChantier(name) {
            if (name && !state.chantiers.includes(name)) {
                state.chantiers.push(name);
                localStorage.setItem('chantiers', JSON.stringify(state.chantiers));
                loadChantiers();
            }
        }

        // Format duration
        function formatDuration(ms) {
            const totalSec = Math.floor(ms / 1000);
            const h = Math.floor(totalSec / 3600);
            const m = Math.floor((totalSec % 3600) / 60);
            const s = totalSec % 60;
            return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        function formatTime(date) {
            return date.toLocaleTimeString('fr-CH', {hour: '2-digit', minute: '2-digit'});
        }

        function setStatus(html) {
            document.getElementById('statusBar').innerHTML = html;
        }

        // DAY
        function toggleDay() {
            if (!state.dayStarted) {
                startDay();
            } else {
                endDay();
            }
        }

        function startDay() {
            state.dayStarted = true;
            state.dayStart = new Date();
            const btn = document.getElementById('btnDay');
            btn.className = 'btn btn-day-end';
            btn.innerHTML = '🌙 Fin de Journée';
            document.getElementById('interventionSection').classList.remove('hidden');
            document.getElementById('pauseSection').classList.remove('hidden');
            setStatus(`<span class="running-indicator"></span> Journée commencée à ${formatTime(state.dayStart)}`);
        }

        function endDay() {
            // End running intervention/pause first
            if (state.interventionRunning) toggleIntervention();
            if (state.pauseRunning) togglePause();

            state.dayEnd = new Date();
            state.dayStarted = false;

            document.getElementById('btnDay').classList.add('hidden');
            document.getElementById('interventionSection').classList.add('hidden');
            document.getElementById('pauseSection').classList.add('hidden');

            showLog();
        }

        // INTERVENTION
        function toggleIntervention() {
            if (!state.interventionRunning) {
                startIntervention();
            } else {
                endIntervention();
            }
        }

        function startIntervention() {
            if (state.pauseRunning) return alert("Termine d'abord la pause !");

            document.getElementById('interventionInput').style.display = 'block';
            const chantier = document.getElementById('chantierText').value.trim();
            if (!chantier) {
                alert("Indique un chantier avant de démarrer !");
                return;
            }

            state.interventionRunning = true;
            state.interventionStart = new Date();
            saveChantier(chantier);

            const btn = document.getElementById('btnIntervention');
            btn.className = 'btn btn-intervention-end';
            btn.innerHTML = '⏹️ Fin Intervention';
            document.getElementById('interventionTimer').classList.remove('hidden');
            document.getElementById('interventionInput').style.display = 'none';

            setStatus(`<span class="running-indicator"></span> Intervention: ${chantier}`);

            interventionInterval = setInterval(() => {
                const elapsed = Date.now() - state.interventionStart.getTime();
                document.getElementById('interventionTimer').textContent = formatDuration(elapsed);
            }, 1000);
        }

        function endIntervention() {
            state.interventionRunning = false;
            const end = new Date();
            const duration = end - state.interventionStart;
            const chantier = document.getElementById('chantierText').value.trim();

            state.interventions.push({
                chantier: chantier,
                start: state.interventionStart,
                end: end,
                duration: duration
            });

            clearInterval(interventionInterval);
            const btn = document.getElementById('btnIntervention');
            btn.className = 'btn btn-intervention-start';
            btn.innerHTML = '▶️ Début Intervention';
            document.getElementById('interventionTimer').classList.add('hidden');
            document.getElementById('interventionInput').style.display = 'block';
            document.getElementById('chantierText').value = '';
            document.getElementById('chantierSelect').value = '';

            setStatus(`<span class="running-indicator"></span> Journée en cours — en attente`);
        }

        // Show intervention input when section visible
        document.getElementById('interventionSection').addEventListener('transitionend', () => {
            if (!document.getElementById('interventionSection').classList.contains('hidden')) {
                document.getElementById('interventionInput').style.display = 'block';
            }
        });

        // Make sure input shows when day starts
        const observer = new MutationObserver(() => {
            if (!document.getElementById('interventionSection').classList.contains('hidden') && !state.interventionRunning) {
                document.getElementById('interventionInput').style.display = 'block';
            }
        });
        observer.observe(document.getElementById('interventionSection'), {attributes: true});

        // PAUSE
        function togglePause() {
            if (!state.pauseRunning) {
                startPause();
            } else {
                endPause();
            }
        }

        function startPause() {
            if (state.interventionRunning) {
                // Auto-end intervention
                endIntervention();
            }

            state.pauseRunning = true;
            state.pauseStart = new Date();

            const btn = document.getElementById('btnPause');
            btn.className = 'btn btn-pause-end';
            btn.innerHTML = '▶️ Fin Pause';
            document.getElementById('pauseTimer').classList.remove('hidden');

            setStatus(`<span class="running-indicator"></span> En pause depuis ${formatTime(state.pauseStart)}`);

            pauseInterval = setInterval(() => {
                const elapsed = Date.now() - state.pauseStart.getTime();
                document.getElementById('pauseTimer').textContent = formatDuration(elapsed);
            }, 1000);
        }

        function endPause() {
            state.pauseRunning = false;
            const end = new Date();
            const duration = end - state.pauseStart;

            state.pauses.push({
                start: state.pauseStart,
                end: end,
                duration: duration
            });

            clearInterval(pauseInterval);
            const btn = document.getElementById('btnPause');
            btn.className = 'btn btn-pause-start';
            btn.innerHTML = '⏸️ Début Pause';
            document.getElementById('pauseTimer').classList.add('hidden');

            setStatus(`<span class="running-indicator"></span> Journée en cours — en attente`);
        }

        // LOG
        function showLog() {
            const logSection = document.getElementById('logSection');
            const logEntries = document.getElementById('logEntries');
            logEntries.innerHTML = '';

            // Day header
            const dayEntry = document.createElement('div');
            dayEntry.className = 'log-entry';
            dayEntry.innerHTML = `<strong>📅 Journée:</strong> ${formatTime(state.dayStart)} → ${formatTime(state.dayEnd)}`;
            logEntries.appendChild(dayEntry);

            // Interventions
            state.interventions.forEach(iv => {
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.innerHTML = `<strong>🔧 ${iv.chantier}</strong><br>${formatTime(iv.start)} → ${formatTime(iv.end)} (${formatDuration(iv.duration)})`;
                logEntries.appendChild(entry);
            });

            // Pauses
            state.pauses.forEach(p => {
                const entry = document.createElement('div');
                entry.className = 'log-entry pause';
                entry.innerHTML = `<strong>☕ Pause</strong><br>${formatTime(p.start)} → ${formatTime(p.end)} (${formatDuration(p.duration)})`;
                logEntries.appendChild(entry);
            });

            // Totals
            const totalDay = state.dayEnd - state.dayStart;
            const totalPause = state.pauses.reduce((sum, p) => sum + p.duration, 0);
            const totalWorked = totalDay - totalPause;

            document.getElementById('totalWorked').textContent = formatDuration(totalWorked);
            document.getElementById('totalPauseDisplay').textContent = `Pauses: ${formatDuration(totalPause)} | Présence: ${formatDuration(totalDay)}`;

            logSection.style.display = 'block';
            setStatus('✅ Journée terminée !');
        }

        // EMAIL
        function sendByEmail() {
            const date = state.dayStart.toLocaleDateString('fr-CH');
            let body = `RAPPORT D'HEURES - ${date}%0D%0A`;
            body += `================================%0D%0A%0D%0A`;
            body += `Journée: ${formatTime(state.dayStart)} → ${formatTime(state.dayEnd)}%0D%0A%0D%0A`;

            body += `INTERVENTIONS:%0D%0A`;
            state.interventions.forEach(iv => {
                body += `• ${iv.chantier}: ${formatTime(iv.start)} → ${formatTime(iv.end)} (${formatDuration(iv.duration)})%0D%0A`;
            });

            body += `%0D%0APAUSES:%0D%0A`;
            state.pauses.forEach(p => {
                body += `• ${formatTime(p.start)} → ${formatTime(p.end)} (${formatDuration(p.duration)})%0D%0A`;
            });

            const totalDay = state.dayEnd - state.dayStart;
            const totalPause = state.pauses.reduce((sum, p) => sum + p.duration, 0);
            const totalWorked = totalDay - totalPause;

            body += `%0D%0A================================%0D%0A`;
            body += `TOTAL TRAVAILLÉ: ${formatDuration(totalWorked)}%0D%0A`;
            body += `Total pauses: ${formatDuration(totalPause)}%0D%0A`;
            body += `Présence totale: ${formatDuration(totalDay)}%0D%0A`;

            const subject = `Rapport heures - ${date}`;
            window.location.href = `mailto:?subject=${subject}&body=${body}`;
        }

        // RESET
        function resetAll() {
            if (!confirm('Commencer une nouvelle journée ?')) return;
            state = {
                dayStarted: false,
                dayStart: null,
                dayEnd: null,
                interventionRunning: false,
                interventionStart: null,
                pauseRunning: false,
                pauseStart: null,
                interventions: [],
                pauses: [],
                chantiers: state.chantiers // keep chantiers
            };
            document.getElementById('logSection').style.display = 'none';
            const btn = document.getElementById('btnDay');
            btn.className = 'btn btn-day-start';
            btn.innerHTML = '☀️ Début de Journée';
            btn.classList.remove('hidden');
            setStatus('Prêt à commencer la journée');
        }
    </script>
</body>
</html>
